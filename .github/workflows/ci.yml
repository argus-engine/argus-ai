# SPDX-License-Identifier: Apache-2.0
# ---------------------------------------------------------------------------
# Argus CI pipeline.
#
# Runs on every pull request to main and on every push to main (so we
# catch post-merge regressions promptly). Five jobs:
#
#   lint        — ruff check + ruff format --check (gates)
#   typecheck   — mypy strict (gates)
#   test        — pytest matrix on Python 3.11 + 3.12 (gates)
#   security    — bandit gates; pip-audit warns but does not gate in Phase 1
#   docker-build— buildx multi-arch (amd64 + arm64), no push (gates once the
#                 Dockerfile lands in Task #11)
#
# In-progress runs on the same ref are cancelled when a newer commit
# arrives — saves CI minutes on busy PRs and keeps the latest commit
# authoritative.
#
# CI never hits live external APIs. Every Kaggle / GDELT / SEC EDGAR
# integration is mocked via pytest_httpx or a Protocol substitute.
# ---------------------------------------------------------------------------

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: mypy
        run: mypy

  test:
    name: Test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: pytest with coverage
        run: |
          pytest \
            --cov=argus \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov
      - name: Upload coverage XML (py3.11 only)
        if: matrix.python == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error
          retention-days: 14

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: bandit (gates)
        run: bandit -c pyproject.toml -r argus
      - name: pip-audit (advisory)
        # pip-audit reports third-party advisories that may be unrelated to
        # this PR; we surface them but do not gate merges on them in
        # Phase 1. Phase 5 polish flips this to a hard gate with an
        # explicit ignore list for any tolerated CVEs.
        continue-on-error: true
        run: pip-audit --strict

  docker-build:
    name: Docker build (multi-arch, no push)
    runs-on: ubuntu-latest
    # Auto-skip while no Dockerfile exists (Task #11 lands it). The job
    # activates automatically the moment infra/docker/Dockerfile is on
    # the branch, and branch-protection rules can still require it from
    # day one — GitHub treats a skipped required check as passing.
    if: ${{ hashFiles('infra/docker/Dockerfile') != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build multi-arch image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: argus:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
